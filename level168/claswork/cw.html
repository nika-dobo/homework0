<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="cw.css" />
  </head>
  <body>
    <div class="left">
      <p id="temp">16</p>
      <div class="cels">
        <p id="city">Tbilisim</p>
        <p id="time">06:09 - monday, 9 sep, 2026</p>
      </div>
      <img src="" alt="" id="weathericon">
    </div>

    <div class="right">
      <form action="">
        <input
          type="text"
          name="city"
          id="city-input"
          placeholder="search location..."
        />
      </form>
      <p>weather details...</p>

      <p id="weather"></p>

      <div>
        <p>tempurature in celsius</p>
        <p id="temcels"></p>
        <img src="" alt="" />
      </div>

      <div>
        <p>temperature in fahrenheit</p>
        <p id="temfah"></p>
        <img src="" alt="" />
      </div>

      <div>
        <p>humidity</p>
        <p id="humidity"></p>
        <img src="" alt="" />
      </div>

      <div>
        <p>cloudy</p>
        <p id="cloudy"></p>
        <img src="" alt="" />
      </div>

      <div>
        <p>wind</p>
        <p id="wind"></p>
        <img src="" alt="" />
      </div>
    </div>

    <script src="cw.js"></script>
  </body>
</html>
